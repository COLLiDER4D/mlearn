name: Auto Release from Branch

on:
  push:
    branches:
      - "release/**"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create tags/releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release name from branch
        id: branch
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          RELEASE_NAME=${BRANCH#release/}
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT

      - name: Extract tag version from pyproject.toml
        id: package
        run: |
          VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "([^"]+)"/\1/')
          if [ -z "$VERSION" ]; then
            echo "Could not read project version from pyproject.toml"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create Git tag if missing
        id: tag
        run: |
          git fetch --tags --force
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          TAG="${{ steps.package.outputs.tag }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping tag creation."
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.tag }}
          name: Release ${{ steps.branch.outputs.release_name }}
          generate_release_notes: true
          overwrite_files: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
